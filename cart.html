<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart | Kicksly</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="navbar container">
        <div class="logo"><a href="index.html">
            <img src="store images/images/kicksly.png" width="160px">
        </div></a>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
            </ul>
        </nav>
        <div class="cart-icon" style="position:relative; cursor:pointer;">
            <img src="store images/images/cart.png" width="25px">
            <span id="cart-count" style="position:absolute; top:-8px; right:-8px; background:red; color:white; border-radius:50%; width:18px; height:18px; font-size:11px; display:flex; align-items:center; justify-content:center;">0</span>
        </div>
    </div>

    <div class="cart-container container">
        <h2>Your Cart</h2>
        <div id="cart-items"></div>
        <div id="cart-total"></div>
    </div>

    <script src="script.js"></script>
    <script src="cart.js"></script>
</body>
</html>
